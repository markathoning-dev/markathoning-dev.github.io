<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Immersive Gallery</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #1a1a1a; color: #fff; min-height: 100vh; }
    .header { background: #000; padding: 2rem; text-align: center; }
    .header h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .header p { color: #888; }
    .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2rem; padding: 2rem; max-width: 1400px; margin: 0 auto; }
    .painting-card { background: #2a2a2a; border-radius: 12px; overflow: hidden; transition: transform 0.3s ease; }
    .painting-card:hover { transform: translateY(-5px); }
    .painting-image { width: 100%; height: 250px; background: linear-gradient(135deg, #3a3a3a 0%, #2a2a2a 100%); display: flex; align-items: center; justify-content: center; color: #555; font-size: 3rem; }
    .painting-info { padding: 1.5rem; }
    .painting-title { font-size: 1.2rem; margin-bottom: 0.5rem; }
    .painting-period { color: #888; font-size: 0.9rem; }
    .footer { text-align: center; padding: 2rem; color: #666; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Immersive Gallery</h1>
    <p>A Collection of Digital Artworks</p>
  </div>
  <div class="gallery" data-paintings></div>
  <div class="footer">
    <p>&copy; 2026 Immersive Gallery (Updated)</p>
  </div>
  <script>
    const paintings = [
      { period: 'Early Works', title: 'Study in Blue', color: '#4a4a8a' },
      { period: 'Early Works', title: 'The Beginning', color: '#5a6a4a' },
      { period: '2023-2024', title: 'Urban Dusk', color: '#5a4a4a' },
      { period: '2023-2024', title: 'Fractured Light', color: '#4a5a7a' },
      { period: '2023-2024', title: 'Quiet Room', color: '#6a5a4a' },
      { period: '2025', title: 'Horizon Scan', color: '#4a7a6a' },
      { period: '2025', title: 'Still Motion', color: '#7a5a6a' }
    ];

    const gallery = document.querySelector('[data-paintings]');
    paintings.forEach((p, index) => {
      const card = document.createElement('div');
      card.className = 'painting-card';
      card.innerHTML = `
        <div class="painting-image" style="background: ${p.color}">
          <span>🎨</span>
        </div>
        <div class="painting-info">
          <h3 class="painting-title">${p.title}</h3>
          <span class="painting-period">${p.period}</span>
        </div>
      `;
      gallery.appendChild(card);
    });
  </script>
</body>
</html>
