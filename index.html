<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Immersive Gallery</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #1a1a1a; color: #fff; min-height: 100vh; }
    .header { background: #000; padding: 2rem; text-align: center; }
    .header h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .header p { color: #888; }
    .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2rem; padding: 2rem; max-width: 1400px; margin: 0 auto; }
    .painting-card { background: #2a2a2a; border-radius: 12px; overflow: hidden; transition: transform 0.3s ease; }
    .painting-card:hover { transform: translateY(-5px); }
    .painting-image { width: 100%; height: 250px; overflow: hidden; }
    .painting-image img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s ease; }
    .painting-card:hover .painting-image img { transform: scale(1.1); }
    .painting-info { padding: 1.5rem; }
    .painting-title { font-size: 1.2rem; margin-bottom: 0.5rem; }
    .painting-period { color: #888; font-size: 0.9rem; }
    .footer { text-align: center; padding: 2rem; color: #666; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Immersive Gallery</h1>
    <p>A Collection of Digital Artworks</p>
  </div>
  <div class="gallery" data-paintings></div>
  <div class="footer">
    <p>&copy; 2026 Immersive Gallery</p>
  </div>
  <script>
    const paintings = [
      { period: 'Early Works', title: 'Study in Blue', src: 'paintings/study-blue.jpg' },
      { period: 'Early Works', title: 'The Beginning', src: 'paintings/beginning.jpg' },
      { period: '2023-2024', title: 'Urban Dusk', src: 'paintings/urban-dusk.jpg' },
      { period: '2023-2024', title: 'Fractured Light', src: 'paintings/fractured-light.jpg' },
      { period: '2023-2024', title: 'Quiet Room', src: 'paintings/quiet-room.jpg' },
      { period: '2025', title: 'Horizon Scan', src: 'paintings/horizon-scan.jpg' },
      { period: '2025', title: 'Still Motion', src: 'paintings/still-motion.jpg' }
    ];

    const gallery = document.querySelector('[data-paintings]');
    paintings.forEach(p => {
      const card = document.createElement('div');
      card.className = 'painting-card';
      card.innerHTML = `
        <div class="painting-image">
          <img src="${p.src}" alt="${p.title}" loading="lazy" />
        </div>
        <div class="painting-info">
          <h3 class="painting-title">${p.title}</h3>
          <span class="painting-period">${p.period}</span>
        </div>
      `;
      gallery.appendChild(card);
    });
  </script>
</body>
</html>
