<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Immersive Gallery</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #1a1a1a; color: #fff; min-height: 100vh; }
    .header { background: #000; padding: 2rem; text-align: center; }
    .header h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .header p { color: #888; }
    .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2rem; padding: 2rem; max-width: 1400px; margin: 0 auto; }
    .painting-card { background: #2a2a2a; border-radius: 12px; overflow: hidden; transition: transform 0.3s ease; }
    .painting-card:hover { transform: translateY(-5px); }
    .painting-image { width: 100%; height: 250px; overflow: hidden; }
    .painting-image img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s ease; }
    .painting-card:hover .painting-image img { transform: scale(1.1); }
    .painting-info { padding: 1.5rem; }
    .painting-title { font-size: 1.2rem; margin-bottom: 0.5rem; }
    .painting-period { color: #888; font-size: 0.9rem; }
    .footer { text-align: center; padding: 2rem; color: #666; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Immersive Gallery</h1>
    <p>2026</p>
    <p style="color: #666; margin-top: 0.5rem; font-size: 0.9rem;">by <a href="https://instagram.com/maria_cabral_painter" target="_blank" style="color: #666; text-decoration: none;">Maria Cabral</a> <a href="https://instagram.com/maria_cabral_painter" target="_blank" style="color: #666; text-decoration: none;">@maria_cabral_painter</a></p>
  </div>
  <div class="gallery" data-photos></div>
  <div class="footer">
    <p>&copy; 2026 Immersive Gallery</p>
  </div>
  <script>
    const photos = [
      { date: '2026-03-18', title: 'March 18', src: 'art/20260318_134313.jpg' },
      { date: '2026-02-23', title: 'February 23', src: 'art/20260223_204805.jpg' },
      { date: '2026-02-08', title: 'February 8', src: 'art/20260208_150607.jpg' },
      { date: '2026-01-15', title: 'January 15', src: 'art/20260115_005907.jpg' }
    ];

    const gallery = document.querySelector('[data-photos]');
    photos.forEach(photo => {
      const card = document.createElement('div');
      card.className = 'painting-card';
      card.innerHTML = `
        <div class="painting-image">
          <img src="${photo.src}" alt="${photo.title}" loading="lazy" />
        </div>
        <div class="painting-info">
          <h3 class="painting-title">${photo.title}</h3>
          <span class="painting-period">${photo.date}</span>
        </div>
      `;
      gallery.appendChild(card);
    });
  </script>
</body>
</html>
